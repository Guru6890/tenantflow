<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Workspace Dashboard - SaaSify{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex">

    <!-- Sidebar Navigation -->
    <aside class="w-64 bg-white border-r border-slate-100 flex flex-col justify-between shrink-0 hidden md:flex">
        <div class="p-6">
            <!-- Brand & Workspace Indicator -->
            <div class="flex flex-col gap-1 pb-6 border-b border-slate-100">
                <span class="text-xs font-semibold text-blue-600 uppercase tracking-wider">SaaSify Workspace</span>
                <div class="flex items-center gap-2 mt-1">
                    <span class="text-lg font-bold text-slate-800">
                        {{ request.session.active_workspace_name|default:"Acme Corp" }}
                    </span>
                    <span class="text-[10px] bg-slate-100 px-1.5 py-0.5 rounded text-slate-500 font-medium">V1</span>
                </div>
            </div>

            <!-- Main Nav Links -->
            <nav class="mt-8 space-y-2">
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-blue-600 bg-blue-50/50 rounded-xl">
                    <span>📊</span> Dashboard
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl transition-colors">
                    <span>👥</span> Staff & Teams
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-xl transition-colors">
                    <span>⚙️</span> Workspace Settings
                </a>
            </nav>
        </div>

        <!-- User / Logout Area at Bottom -->
        <div class="p-4 border-t border-slate-100 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-slate-200 flex items-center justify-center font-bold text-slate-600">
                    {{ request.user.email|slice:":1"|upper }}
                </div>
                <div class="truncate max-w-[120px]">
                    <p class="text-sm font-semibold text-slate-800 truncate">{{ request.user.email }}</p>
                    <p class="text-[11px] text-slate-400">Owner Role</p>
                </div>
            </div>
            <a href="#" class="text-slate-400 hover:text-red-500 text-sm transition-colors" title="Log Out">
                🚪
            </a>
        </div>
    </aside>

    <!-- Main Content Area Wrapper -->
    <div class="flex-grow flex flex-col min-h-screen overflow-y-auto">
        <!-- Top Mobile Header -->
        <header class="md:hidden bg-white border-b border-slate-100 px-6 py-4 flex items-center justify-between">
            <span class="font-bold text-blue-600">SaaSify</span>
            <span class="text-sm font-semibold text-slate-700">Menu</span>
        </header>

        <!-- Dynamic Dashboard Page Content -->
        <main class="p-6 lg:p-10 max-w-7xl w-full mx-auto">
            {% block dashboard_content %}
            {% endblock dashboard_content %}
        </main>
    </div>

</body>
</html>
